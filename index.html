.link-upd-fetch-btn{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;-webkit-tap-highlight-color:transparent}
.link-upd-fetch-btn:disabled{opacity:.55;cursor:not-allowed}
/* ── END SCROLL SAFETY ──────────────────────────────────────── */

/* KPI grid drag-and-drop */
/* ── SURPRISE ME ────────────────────────────────────────────── */
.surp-tab{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;flex-shrink:0}
.surp-tab.active{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(201,168,76,.2));border-color:rgba(124,58,237,.5);color:#c4b5fd}
.surp-tab:active{transform:scale(.93)}
.surp-era-btn,.surp-genre-btn{padding:5px 11px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;-webkit-tap-highlight-color:transparent}
.surp-era-btn.active,.surp-genre-btn.active{background:rgba(201,168,76,.15);border-color:var(--accent);color:var(--accent)}
/* Recommendation card */
.surp-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.surp-card:active{transform:scale(.98)}
.surp-card.highlight{border-color:rgba(124,58,237,.5);background:rgba(124,58,237,.06)}
/* ── END SURPRISE ME ─────────────────────────────────────────── */
.price-bar{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.price-bar-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.price-cell{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:10px;background:var(--surface);border:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;text-decoration:none;color:inherit}
.price-cell:active{transform:scale(.95)}
.price-cell-label{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
.price-cell-value{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;line-height:1}
.price-cell.low .price-cell-value{color:#4ade80}
.price-cell.med .price-cell-value{color:var(--accent)}
.price-cell.high .price-cell-value{color:#f87171}
.price-cell.med{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.06)}
.price-bar-meta{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:8px;margin-top:2px}
.price-bar-meta b{color:var(--text-dim);font-weight:600}
/* ── END PRICE RANGE BAR ────────────────────────────────────── */

/* ── DASHBOARD WIDGET GRID ──────────────────────────────────── */
#dash-widget-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.dw{border-radius:18px;background:var(--surface);border:1px solid var(--border);overflow:hidden;position:relative;transition:box-shadow .2s,transform .15s}
.dw[onclick]:not(.edit-mode):hover{box-shadow:0 4px 20px rgba(0,0,0,.25);border-color:rgba(201,168,76,.3)}
.dw[onclick]:not(.edit-mode):active{transform:scale(.98)}
.dw.full{grid-column:1/-1}
.dw.half{grid-column:span 1}
.dw.edit-mode{cursor:grab;border-color:rgba(201,168,76,.4)!important;box-shadow:0 0 0 2px rgba(201,168,76,.15)}
.dw.edit-mode:active{cursor:grabbing}
.dw.drag-over{box-shadow:0 0 0 2px var(--accent),0 4px 20px rgba(201,168,76,.2)!important}
.dw.dragging{opacity:.4;transform:scale(.97)}
.dw-handle{
  position:absolute;top:0;left:0;right:0;
  height:36px;display:none;align-items:center;justify-content:space-between;
  padding:0 10px;z-index:5;
  background:linear-gradient(180deg,rgba(201,168,76,.18) 0%,transparent 100%);
  border-radius:18px 18px 0 0;
}
.edit-mode .dw-handle{display:flex}
.dw-drag-grip{color:var(--accent);font-size:14px;opacity:.7;letter-spacing:2px;cursor:grab;padding:4px}
.dw-actions{display:flex;gap:4px}
.dw-act-btn{
  width:24px;height:24px;border-radius:7px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;
  background:var(--surface2);color:var(--text-muted);
  -webkit-tap-highlight-color:transparent;transition:all .12s;font-family:'DM Sans',sans-serif;font-weight:700
}
.dw-act-btn:active{transform:scale(.88)}
.dw-act-btn.danger:active{background:rgba(224,92,74,.3);color:var(--red-t)}
.dw-body{padding:18px 16px 14px}
.edit-mode .dw-body{padding-top:44px}
.dw-title{font-size:9px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.3px;margin-bottom:10px}
/* size badge shown in edit mode */
.dw-size-badge{
  position:absolute;bottom:8px;right:10px;display:none;
  font-size:8px;font-weight:800;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.8px;opacity:.5
}
.edit-mode .dw-size-badge{display:block}
/* pill strip inside hero */
#dash-pill-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-top:10px}
#dash-pill-strip::-webkit-scrollbar{display:none}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}70%{box-shadow:0 0 0 14px rgba(248,113,113,.0)}}
#dw-listen-btn.listening{animation:micPulse 1.2s ease-out infinite;border-color:rgba(248,113,113,.8)!important}
.kpi-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.kpi-card.dragging{opacity:.4;transform:scale(.97)}

/* KPI edit mode */
.kpi-edit-mode .kpi-card{cursor:grab}
.kpi-edit-mode .kpi-card:active{cursor:grabbing}
.kpi-drag-handle{display:none}
.kpi-hide-btn{display:none}
.kpi-card.kpi-hidden{display:none}
/* Always-visible card menu button */
.kpi-menu-btn{
  position:absolute;top:6px;right:6px;
  width:22px;height:22px;border-radius:50%;
  background:transparent;border:none;
  color:var(--text-muted);font-size:calc(15px * var(--fs-scale,1));font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;opacity:0.45;transition:opacity .15s,background .15s;
  -webkit-tap-highlight-color:transparent;
  z-index:2;
}
.kpi-menu-btn:hover,.kpi-menu-btn:active{opacity:1;background:var(--surface2)}

/* Top 3 earners podium */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Horizontal 3-up strip */
.podium-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  margin-bottom:14px;
}

.podium-card{
  display:flex;flex-direction:column;align-items:center;
  border-radius:14px;padding:10px 8px 9px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1);
  border:1px solid;
  text-align:center;
}
.podium-card:active{transform:scale(.96)}

/* 1st — warm gold tint, NOT black */
.podium-card.rank-1{
  background:linear-gradient(160deg,rgba(201,168,76,.18) 0%,rgba(201,168,76,.08) 100%);
  border-color:rgba(201,168,76,.45);
  box-shadow:0 4px 20px rgba(201,168,76,.15);
}
.podium-card.rank-1::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),#f0c060,var(--accent));
  background-size:200% 100%;animation:shimmer 2.5s linear infinite;
}
/* 2nd — silver */
.podium-card.rank-2{
  background:linear-gradient(160deg,rgba(180,190,210,.1) 0%,rgba(180,190,210,.04) 100%);
  border-color:rgba(180,190,210,.22);
}
/* 3rd — bronze */
.podium-card.rank-3{
  background:linear-gradient(160deg,rgba(180,100,50,.1) 0%,rgba(180,100,50,.04) 100%);
  border-color:rgba(200,140,80,.2);
}

.podium-medal{
  font-size:calc(15px * var(--fs-scale,1));line-height:1;margin-bottom:5px;
}

.podium-art{
  width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.35);margin-bottom:6px;
}
.podium-art-placeholder{
  width:42px;height:42px;border-radius:8px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:calc(18px * var(--fs-scale,1));
  flex-shrink:0;margin-bottom:6px;
}

.podium-info{width:100%;min-width:0}
.podium-rank-label{font-size:calc(7px * var(--fs-scale,1));font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px}
.podium-card.rank-1 .podium-rank-label{color:var(--accent)}
.podium-card.rank-2 .podium-rank-label{color:#9ab}
.podium-card.rank-3 .podium-rank-label{color:#c87040}
.podium-title{font-size:calc(11px * var(--fs-scale,1));font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.podium-artist{font-size:calc(9px * var(--fs-scale,1));color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.podium-value-wrap{margin-top:5px;text-align:center}
.podium-value{font-family:'Playfair Display',serif;font-weight:700;line-height:1}
.podium-card.rank-1 .podium-value{font-size:calc(15px * var(--fs-scale,1));color:var(--accent)}
.podium-card.rank-2 .podium-value{font-size:calc(13px * var(--fs-scale,1));color:var(--text)}
.podium-card.rank-3 .podium-value{font-size:calc(13px * var(--fs-scale,1));color:var(--text-dim)}
.podium-gain{font-size:calc(9px * var(--fs-scale,1));color:var(--green-t);font-weight:600;margin-top:1px}

/* ── EVENTS SYSTEM ───────────────────────────────────────── */
.event-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;margin-bottom:8px;
  display:flex;gap:12px;align-items:flex-start;
  transition:transform .14s;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.event-card:active{transform:scale(.97)}
.event-card.event-near{
  border-color:rgba(93,186,130,.4);
  background:linear-gradient(135deg,var(--surface) 0%,rgba(93,186,130,.07) 100%);
}
.event-date-box{
  flex-shrink:0;width:44px;text-align:center;
  background:var(--surface2);border-radius:10px;padding:5px 4px;
  border:1px solid var(--border);
}
.event-date-month{font-size:calc(8px * var(--fs-scale,1));font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--accent)}
.event-date-day{font-size:calc(20px * var(--fs-scale,1));font-weight:900;font-family:'Playfair Display',serif;line-height:1;color:var(--text)}
.event-date-year{font-size:calc(8px * var(--fs-scale,1));color:var(--text-muted)}
.event-info{flex:1;min-width:0}
.event-title{font-size:calc(13px * var(--fs-scale,1));font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-venue{font-size:calc(11px * var(--fs-scale,1));color:var(--text-dim);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-location{font-size:calc(10px * var(--fs-scale,1));color:var(--text-muted)}
.event-dist{font-size:calc(10px * var(--fs-scale,1));font-weight:700;color:var(--green-t);background:rgba(93,186,130,.12);border:1px solid rgba(93,186,130,.3);border-radius:6px;padding:2px 6px;display:inline-block;margin-top:3px}
.event-dist.far{color:var(--text-muted);background:var(--surface2);border-color:var(--border)}
.event-source-pill{font-size:calc(9px * var(--fs-scale,1));font-weight:700;padding:2px 7px;border-radius:8px;border:1px solid;margin-left:6px;flex-shrink:0;align-self:flex-start;margin-top:2px}
/* Album card event glow */
.record-card.has-events,
.want-card.has-events,
.sold-card.has-events{
  border-color:rgba(93,186,130,.5)!important;
  box-shadow:0 0 0 1px rgba(93,186,130,.2),0 4px 16px rgba(93,186,130,.12)!important;
}
.record-card.has-events::before,
.want-card.has-events::before,
.sold-card.has-events::before{
  content:'🎫';position:absolute;top:8px;right:10px;font-size:calc(14px * var(--fs-scale,1));
  animation:evtPulse 2s ease-in-out infinite;
}
@keyframes evtPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
/* Events overlay sheet */
#events-overlay{z-index:880}
#events-overlay .sell-sheet-inner{max-height:88vh;overflow-y:auto;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.events-service-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.events-service-pill{padding:5px 12px;border-radius:20px;font-size:calc(11px * var(--fs-scale,1));font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;-webkit-tap-highlight-color:transparent}
/* Scan all banner on collection page */
#events-scan-bar{
  display:none;
  background:linear-gradient(135deg,rgba(93,186,130,.15),rgba(93,186,130,.05));
  border:1px solid rgba(93,186,130,.3);border-radius:14px;
  padding:10px 14px;margin-bottom:10px;
  flex-direction:row;align-items:center;gap:10px;
}
#events-scan-bar.visible{display:flex}

/* ── END EVENTS SYSTEM ───────────────────────────────────── */

/* ── DISCOGS AUTO-SYNC ───────────────────────────────────── */
.dsync-card{background:linear-gradient(135deg,rgba(90,171,219,.12),rgba(90,171,219,.04));border:1px solid rgba(90,171,219,.35);border-radius:16px;padding:14px 16px;margin-bottom:14px}
.dsync-title{font-size:calc(13px * var(--fs-scale,1));font-weight:800;color:#5aabdb;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.dsync-sub{font-size:calc(11px * var(--fs-scale,1));color:var(--text-muted);line-height:1.5;margin-bottom:12px}
.dsync-btn{padding:10px 20px;border-radius:12px;background:#5aabdb;color:#fff;border:none;font-size:calc(13px * var(--fs-scale,1));font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:7px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.dsync-btn:active{transform:scale(.93)}
.dsync-btn:disabled{opacity:.5;cursor:not-allowed}
.dsync-btn.secondary{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
.dsync-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
.dsync-status-pill{font-size:calc(10px * var(--fs-scale,1));font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted)}
.dsync-status-pill.ok{border-color:rgba(93,186,130,.4);background:rgba(93,186,130,.1);color:var(--green-t)}
.dsync-status-pill.warn{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.1);color:var(--accent)}
/* sync review sheet items */
.dsync-item{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.dsync-item:last-child{border-bottom:none}
.dsync-item-art{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:calc(20px * var(--fs-scale,1))}
.dsync-item-chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.dsync-item-chk.on{background:var(--accent);border-color:var(--accent)}
.dsync-item-chk.on::after{content:'✓';font-size:calc(12px * var(--fs-scale,1));font-weight:800;color:var(--bg)}
.dsync-progress{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:8px}
.dsync-progress-bar{height:100%;background:linear-gradient(90deg,#5aabdb,#38bdf8);border-radius:2px;transition:width .3s;width:0%}
/* ── DISCOGS SWIPE CARDS ─────────────────────────────────── */
.dsync-swipe-wrap{
  position:relative;overflow:hidden;border-radius:14px;
  margin-bottom:8px;touch-action:pan-y;
}
/* behind-card action reveals */
.dsync-swipe-behind{
  position:absolute;inset:0;border-radius:14px;
  display:flex;align-items:center;pointer-events:none;
}
.dsync-behind-want{
  background:linear-gradient(90deg,rgba(201,168,76,.25) 0%,transparent 100%);
  justify-content:flex-start;padding-left:16px;
}
.dsync-behind-coll{
  background:linear-gradient(270deg,rgba(93,186,130,.25) 0%,transparent 100%);
  justify-content:flex-end;padding-right:16px;
}
.dsync-behind-icon{font-size:calc(22px * var(--fs-scale,1));opacity:0;transition:opacity .15s,transform .15s;transform:scale(.7)}
/* main swipeable card */
.dsync-swipe-card{
  position:relative;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:11px 14px;
  display:flex;gap:11px;align-items:center;
  transition:border-color .2s,background .2s;
  will-change:transform;
  user-select:none;-webkit-user-select:none;
}
.dsync-swipe-card.dest-want{
  border-color:rgba(201,168,76,.5);
  background:linear-gradient(90deg,rgba(201,168,76,.1),var(--surface));
}
.dsync-swipe-card.dest-coll{
  border-color:rgba(93,186,130,.45);
  background:linear-gradient(270deg,rgba(93,186,130,.1),var(--surface));
}
/* destination badge */
.dsync-dest-badge{
  flex-shrink:0;padding:4px 10px;border-radius:20px;
  font-size:calc(10px * var(--fs-scale,1));font-weight:800;letter-spacing:.3px;
  border:1px solid;cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.dsync-dest-badge.want{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.5);color:var(--accent)}
.dsync-dest-badge.coll{background:rgba(93,186,130,.15);border-color:rgba(93,186,130,.45);color:var(--green-t)}
.dsync-dest-badge.none{background:var(--surface2);border-color:var(--border);color:var(--text-muted)}
/* ── END SWIPE CARDS ─────────────────────────────────────── */

/* Pie chart KPI */
.kpi-pie-wrap{display:flex;align-items:center;gap:14px;margin-top:6px}
.kpi-pie-legend{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.kpi-pie-leg-item{display:flex;align-items:center;gap:6px;font-size:10.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-pie-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Page section separator — breathing room between KPI strip and content ── */
.page-section{padding-top:14px;margin-top:6px;border-top:1px solid var(--border)}

/* ── KPI CARDS ── */
.kpi-card{
  border-radius:18px;
  padding:20px 18px 16px;
  position:relative;
  overflow:hidden;
  transition:transform .16s cubic-bezier(.34,1.56,.64,1), box-shadow .16s;
  border:1px solid rgba(255,255,255,.06);
  /* Glass morphism base */
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  /* Ensure content stacks, not overlaps */
  display:flex;flex-direction:column;justify-content:flex-start;
}
/* Tinted gradient background per state */
.kpi-card{background:linear-gradient(145deg,var(--surface) 0%,var(--surface2) 100%)}
.kpi-card.gold-bar{
  background:linear-gradient(145deg,var(--surface) 0%,rgba(201,168,76,.08) 100%);
  box-shadow:0 4px 24px rgba(201,168,76,.10),0 1px 4px rgba(0,0,0,.2);
  border-color:rgba(201,168,76,.18);
}
.kpi-card.green-bar{
  background:linear-gradient(145deg,var(--surface) 0%,rgba(93,186,130,.08) 100%);
  box-shadow:0 4px 24px rgba(93,186,130,.10),0 1px 4px rgba(0,0,0,.2);
  border-color:rgba(93,186,130,.18);
}
.kpi-card.red-bar{
  background:linear-gradient(145deg,var(--surface) 0%,rgba(224,92,74,.08) 100%);
  box-shadow:0 4px 24px rgba(224,92,74,.10),0 1px 4px rgba(0,0,0,.2);
  border-color:rgba(224,92,74,.18);
}
.kpi-card.blue-bar{
  background:linear-gradient(145deg,var(--surface) 0%,rgba(90,171,219,.08) 100%);
  box-shadow:0 4px 24px rgba(90,171,219,.10),0 1px 4px rgba(0,0,0,.2);
  border-color:rgba(90,171,219,.18);
}
/* Top accent bar */
.kpi-card::before{
  content:'';position:absolute;top:0;left:18px;right:18px;
  height:2px;border-radius:0 0 3px 3px;
  background:var(--border);
  transition:background .2s,opacity .2s;
  opacity:.6;
}
.kpi-card.gold-bar::before {background:linear-gradient(90deg,var(--accent),#f0c060);opacity:1}
.kpi-card.green-bar::before{background:linear-gradient(90deg,var(--green-t),#86efac);opacity:1}
.kpi-card.red-bar::before  {background:linear-gradient(90deg,var(--red-t),#fca5a5);opacity:1}
.kpi-card.blue-bar::before {background:linear-gradient(90deg,#5aabdb,#93c5fd);opacity:1}
/* Shimmer overlay */
.kpi-card::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 0%,rgba(255,255,255,.055) 0%,transparent 60%);
  pointer-events:none;border-radius:inherit;
}
/* Clickable */
.kpi-card.clickable{cursor:pointer}
.kpi-card.clickable:active{
  transform:scale(.96);
  box-shadow:0 2px 8px rgba(0,0,0,.15)!important;
}
/* Label row */
.kpi-label{
  display:flex;align-items:center;gap:5px;
  font-size:calc(9px * var(--fs-scale,1));font-weight:800;
  color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1.4px;
  margin-bottom:12px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
  padding-right:24px; /* clear the ⋮ menu button */
}
.kpi-icon{width:14px;height:14px;opacity:.5;flex-shrink:0;color:var(--text-muted)}
/* Value — bigger and bolder */
.kpi-value{
  font-family:'Playfair Display',serif;
  font-size:calc(30px * var(--fs-scale,1));font-weight:700;line-height:1.1;
  letter-spacing:-.8px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;max-width:100%;
}
.kpi-value.gold {color:var(--accent);text-shadow:0 0 24px rgba(201,168,76,.3)}
.kpi-value.green{color:var(--green-t);text-shadow:0 0 20px rgba(93,186,130,.25)}
.kpi-value.red  {color:var(--red-t);text-shadow:0 0 20px rgba(224,92,74,.25)}
/* Sub */
.kpi-sub{font-size:calc(10px * var(--fs-scale,1));color:var(--text-muted);margin-top:6px;line-height:1.5;letter-spacing:.2px}
/* Navigate hint */
.kpi-nav{
  position:absolute;top:18px;right:16px;
  font-size:calc(16px * var(--fs-scale,1));color:rgba(255,255,255,.12);
  transition:color .15s;font-weight:300;line-height:1;
}
.kpi-card.clickable:active .kpi-nav{color:var(--text-muted)}
/* Alerts wide card */
.kpi-alerts-card{grid-column:1/-1;border-radius:18px;cursor:pointer}
.section-title{font-family:'Playfair Display',serif;font-size:calc(16px * var(--fs-scale,1));font-weight:700;margin-bottom:12px;margin-top:20px;display:flex;align-items:center;justify-content:space-between}
.section-title span{font-family:'DM Sans',sans-serif;font-size:calc(12px * var(--fs-scale,1));color:var(--accent);font-weight:500;cursor:pointer}
.genre-bar-list{display:flex;flex-direction:column;gap:8px}
.genre-bar-top{display:flex;justify-content:space-between;font-size:calc(12px * var(--fs-scale,1));margin-bottom:4px}
.genre-bar-top b{font-weight:500}
.genre-bar-top span{color:var(--text-dim);font-family:'DM Mono',monospace;font-size:calc(11px * var(--fs-scale,1))}
.genre-bar-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.genre-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .6s ease}
.genre-bar-item:active{opacity:.7}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;margin-bottom:14px}
.search-bar input{background:none;border:none;outline:none;flex:1;color:var(--text);font-family:'DM Sans',sans-serif;font-size:calc(14px * var(--fs-scale,1))}
.search-bar input::placeholder{color:var(--text-muted)}
.filter-chips{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;scrollbar-width:none}
.filter-chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:calc(12px * var(--fs-scale,1));font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);transition:all .2s;white-space:nowrap}
.chip.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600}
.chip:active{transform:scale(.95)}
.record-list{display:flex;flex-direction:column;gap:10px}
.record-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:calc(12px * var(--fs-scale,1)) calc(14px * var(--fs-scale,1));display:flex;gap:calc(12px * var(--fs-scale,1));cursor:pointer;transition:all .2s;position:relative;overflow:clip}
.record-card:active{transform:scale(.98);background:var(--surface2)}
.card-actions{display:flex;gap:6px;margin-top:8px}
.card-btn{padding:5px 12px;border-radius:20px;font-size:calc(11px * var(--fs-scale,1));font-weight:600;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:var(--surface2);color:var(--text-dim);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.card-btn:active{transform:scale(.93)}
.card-btn.edit{color:var(--accent);border-color:var(--accent-dim)}
.card-btn.del{color:var(--red-t);border-color:var(--red-t)}
.card-btn.list-btn{color:#f59e0b;border-color:rgba(245,158,11,.3)}
.card-btn.list-btn:hover{background:rgba(245,158,11,.12);border-color:#f59e0b}
.card-btn.buy{color:var(--green-t);border-color:var(--green-t)}
/* BUY SHEET */
.buy-sheet-overlay{position:fixed;inset:0;z-index:840;background:rgba(0,0,0,.6);display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.buy-sheet-overlay.open{display:flex}
.buy-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:0 0 calc(var(--tab-h) + env(safe-area-inset-bottom) + 8px);width:100%;max-height:80vh;overflow-y:auto}
.buy-sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.buy-sheet-head{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.buy-sheet-title{font-family:'Playfair Display',serif;font-size:calc(18px * var(--fs-scale,1));font-weight:700;line-height:1.2;margin-bottom:2px}
.buy-sheet-sub{font-size:calc(12px * var(--fs-scale,1));color:var(--text-muted)}
.buy-sheet-links{display:flex;flex-direction:column;gap:8px;padding:14px 16px 0}
.buy-link-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);cursor:pointer;text-decoration:none;transition:all .2s;-webkit-tap-highlight-color:transparent}
.buy-link-btn-preferred{border-color:rgba(201,168,76,.5)!important;background:rgba(201,168,76,.07)!important}
.buy-link-btn-preferred:active{background:rgba(201,168,76,.14)!important}
.w-site-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:calc(12px * var(--fs-scale,1));font-weight:600;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif}
.w-site-chip.active{border-color:var(--accent);background:rgba(201,168,76,.15);color:var(--accent)}
.buy-order-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);transition:opacity .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.buy-order-item:last-child{border-bottom:none}
.buy-order-item.drag-over{background:var(--accent-glow);border-radius:8px;padding-left:8px;margin:0 -8px}
.buy-link-btn:active{transform:scale(.97);background:var(--surface)}
.buy-link-btn-hot{border-color:rgba(93,186,130,.5)!important;background:rgba(93,186,130,.07)!important}
.buy-link-btn-hot:active{background:rgba(93,186,130,.14)!important}
/* ── Z-INDEX STACK (clean hierarchy) ──────────────────────────
   800  header + bottom nav (always visible)
   810  fullpanels (backup, search, spotify)
   820  add-picker overlay
   830  album/record detail modal  ← opened from pages
   840  buy-sheet + sell-sheet     ← opened from album modal
   850  form-modal (edit record)
   860  celeb overlay
   870  color-panel / customise
   880  events overlay
   900  ms-action-bar (above nav)
  1000  welcome screen
  1050  centred modals (capture picker, dsync review)
  1100  menu dropdown
──────────────────────────────────────────────────────────── */
.celeb-overlay{position:fixed;inset:0;z-index:860;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:24px}
.celeb-overlay.open{display:flex;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.celeb-card{width:100%;max-width:360px;background:var(--surface);border-radius:28px;padding:32px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:popUp .3s cubic-bezier(.34,1.5,.64,1)}
@keyframes popUp{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.celeb-emoji{font-size:64px;line-height:1;margin-bottom:16px;display:block;animation:wobble .6s ease .2s both}
@keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
.celeb-title{font-family:'Playfair Display',serif;font-size:calc(24px * var(--fs-scale,1));font-weight:900;margin-bottom:8px;line-height:1.2}
.celeb-sub{font-size:calc(13px * var(--fs-scale,1));color:var(--text-dim);margin-bottom:20px;line-height:1.6}
.celeb-stat-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.celeb-stat{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px 16px;min-width:90px}
.celeb-stat-val{font-family:'DM Mono',monospace;font-size:calc(18px * var(--fs-scale,1));font-weight:700;line-height:1}
.celeb-stat-lbl{font-size:calc(10px * var(--fs-scale,1));color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px;margin-top:4px}
.celeb-msg{font-size:calc(13px * var(--fs-scale,1));color:var(--text-muted);font-style:italic;margin-bottom:24px;padding:0 8px;line-height:1.6}
.celeb-btn{width:100%;padding:14px;border-radius:var(--rs);border:none;font-family:'DM Sans',sans-serif;font-size:calc(15px * var(--fs-scale,1));font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.celeb-btn:active{transform:scale(.97)}
.sell-sheet-overlay{position:fixed;inset:0;z-index:840;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;-webkit-tap-highlight-color:transparent}
.sell-sheet-overlay.open{display:flex}
.sell-sheet-inner{width:100%;max-width:480px;background:var(--surface);border-radius:24px 24px 0 0;padding:0 0 calc(var(--tab-h) + env(safe-area-inset-bottom) + 8px);box-shadow:0 -8px 40px rgba(0,0,0,.5);animation:slideUp .22s cubic-bezier(.34,1.4,.64,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sell-section-divider{font-size:calc(10px * var(--fs-scale,1));font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.9px;padding:14px 20px 6px;margin:0;border-top:1px solid var(--border);margin-top:4px}
/* ── Period Gain KPI ──────────────────────────────────────────────── */
.period-tabs{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.period-tab{padding:4px 10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:calc(10px * var(--fs-scale,1));font-weight:700;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif}
.period-tab.active{background:var(--accent);border-color:var(--accent);color:var(--bg)}
/* ── Want → Collection button ─────────────────────────────────────── */
.want-to-coll-btn{width:100%;padding:13px;border-radius:var(--rs);border:2px solid var(--accent);background:var(--accent-glow);color:var(--accent);font-family:'DM Sans',sans-serif;font-size:calc(14px * var(--fs-scale,1));font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:all .2s}
.want-to-coll-btn:active{transform:scale(.97)}
/* ── Icon Pack Customiser ────────────────────────────────────────── */
.icon-pack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:4px 0}
.icon-pack-tile{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;
  border-radius:16px;border:2px solid var(--border);background:var(--surface2);
  cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent}
.icon-pack-tile.active{border-color:var(--accent);background:var(--accent-glow)}
.icon-pack-tile:active{transform:scale(.93)}
.icon-pack-tile .nav-icon{width:28px;height:28px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.icon-pack-preview{display:flex;gap:4px;align-items:center;justify-content:center;
  background:var(--surface);border-radius:10px;padding:6px 8px;margin-bottom:2px;
  min-height:36px;width:100%}
.icon-pack-preview svg{width:18px;height:18px}
.icon-pack-name{font-size:calc(11px * var(--fs-scale,1));font-weight:700;color:var(--text);text-align:center}
.icon-pack-sub{font-size:calc(9px * var(--fs-scale,1));color:var(--text-muted);text-align:center;margin-top:-2px;line-height:1.3}
.ipc-section-hdr{font-size:calc(10px * var(--fs-scale,1));font-weight:700;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.9px;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* Unified customise panel tab bar */
.cust-tab{padding:11px 4px;background:none;border:none;border-bottom:2px solid transparent;
  font-family:'DM Sans',sans-serif;font-size:calc(11px * var(--fs-scale,1));font-weight:600;color:var(--text-muted);
  cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.cust-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.buy-link-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:calc(20px * var(--fs-scale,1));flex-shrink:0}
.buy-link-info{flex:1}
.buy-link-name{font-size:calc(14px * var(--fs-scale,1));font-weight:600;color:var(--text);margin-bottom:2px}
.buy-link-desc{font-size:calc(11px * var(--fs-scale,1));color:var(--text-muted)}
.buy-link-arrow{font-size:calc(16px * var(--fs-scale,1));color:var(--text-muted)}
.buy-price-tag{text-align:right;flex-shrink:0;min-width:60px}
.buy-price-val{font-family:'DM Mono',monospace;font-size:calc(14px * var(--fs-scale,1));font-weight:700;color:var(--green-t);line-height:1.2}
.buy-price-label{font-size:calc(9px * var(--fs-scale,1));color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.buy-price-spin{font-size:calc(12px * var(--fs-scale,1));color:var(--text-muted);animation:spin .8s linear infinite;display:inline-block}
.buy-price-stale{font-family:'DM Mono',monospace;font-size:calc(13px * var(--fs-scale,1));font-weight:600;color:var(--text-muted)}
.buy-divider{font-size:calc(10px * var(--fs-scale,1));font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:10px 16px 4px}
/* ── Update Options Sheet ─────────────────────────────────────────── */
.upd-opt-row{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.upd-opt-row:last-child{border-bottom:none}
.upd-opt-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:calc(19px * var(--fs-scale,1));flex-shrink:0;background:var(--surface2);border:1px solid var(--border)}
.upd-opt-info{flex:1;min-width:0}
.upd-opt-name{font-size:calc(13px * var(--fs-scale,1));font-weight:700;color:var(--text);margin-bottom:3px}
.upd-opt-sub{font-size:calc(11px * var(--fs-scale,1));color:var(--text-muted);line-height:1.45}
.upd-toggle{position:relative;width:44px;height:26px;flex-shrink:0;cursor:pointer}
.upd-toggle input{opacity:0;width:0;height:0;position:absolute}
.upd-toggle-track{position:absolute;inset:0;border-radius:13px;background:var(--border);transition:background .2s}
.upd-toggle input:checked ~ .upd-toggle-track{background:var(--accent)}
.upd-toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.upd-toggle input:checked ~ .upd-toggle-thumb{transform:translateX(18px)}
.upd-art-mode{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.upd-art-chip{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:calc(11px * var(--fs-scale,1));font-weight:700;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif}
.upd-art-chip.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}
.upd-art-chip:active{transform:scale(.93)}
/* Album picker for selective art replacement */
.upd-album-grid{display:flex;flex-direction:column;gap:6px;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-top:8px;padding:2px 0}
.upd-album-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.upd-album-row.checked{border-color:var(--accent);background:var(--accent-glow)}
.upd-album-row:active{transform:scale(.98)}
.upd-album-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:calc(11px * var(--fs-scale,1));color:transparent}
.upd-album-row.checked .upd-album-check{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.upd-album-thumb{width:34px;height:34px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--surface);border:1px solid var(--border)}
.upd-album-name{flex:1;min-width:0}
.upd-album-title{font-size:calc(12px * var(--fs-scale,1));font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upd-album-artist{font-size:calc(10px * var(--fs-scale,1));color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-art{width:calc(58px * var(--fs-scale,1));height:calc(58px * var(--fs-scale,1));min-width:calc(58px * var(--fs-scale,1));border-radius:8px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);overflow:hidden;position:relative}
.record-art img{width:100%;height:100%;object-fit:cover}
.vinyl-placeholder{width:100%;height:100%;background:radial-gradient(circle at 50% 50%,#111 18%,#1a1a1a 18%,#1a1a1a 22%,#111 22%,#111 35%,#222 35%,#222 37%,#111 37%)}
.record-info{flex:1;min-width:0;overflow:hidden}
.record-title{font-weight:700;font-size:calc(16px * var(--fs-scale,1));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.record-artist{font-size:calc(13px * var(--fs-scale,1));color:var(--text-dim);margin-bottom:6px}
.record-meta{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:calc(10px * var(--fs-scale,1));font-weight:600;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;letter-spacing:.3px}
.badge-cond{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim)}
.badge-genre{background:var(--accent-glow);border:1px solid rgba(201,168,76,.2);color:var(--accent)}
.badge-misc{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
/* Vinyl color / variant / rarity badges */
.badge-vinyl{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);color:var(--accent)}
.badge-variant{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);color:#38bdf8}
.badge-rarity-common{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)}
.badge-rarity-uncommon{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.35);color:#38bdf8}
.badge-rarity-rare{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.4);color:var(--accent)}
.badge-rarity-vr{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);color:#f87171}
.badge-rarity-ur{background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.5);color:#a78bfa;animation:rarePulse 2.4s ease-in-out infinite}
@keyframes rarePulse{0%,100%{box-shadow:0 0 0 0 rgba(167,139,250,.0)}50%{box-shadow:0 0 6px 1px rgba(167,139,250,.4)}}
.vinyl-color-dot{display:inline-block;width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,.25);flex-shrink:0;vertical-align:middle;margin-right:3px;margin-bottom:1px}
.record-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0;align-self:stretch}
.record-value{font-family:'DM Mono',monospace;font-size:calc(14px * var(--fs-scale,1));font-weight:600;color:var(--accent)}
.record-gain{font-family:'DM Mono',monospace;font-size:calc(11px * var(--fs-scale,1))}
.record-gain.pos{color:var(--green-t)}.record-gain.neg{color:var(--red-t)}
.star-rating{font-size:calc(9px * var(--fs-scale,1));color:var(--accent)}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty-state .emoji{font-size:calc(40px * var(--fs-scale,1));margin-bottom:12px}
.modal-overlay{position:fixed;inset:0;z-index:830;background:rgba(0,0,0,.87);display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{width:100%;max-height:92vh;overflow-y:auto;background:var(--surface);border-radius:24px 24px 0 0;padding:0 0 calc(var(--tab-h) + env(safe-area-inset-bottom) + 8px);animation:slideUp .3s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto}
.modal-header{padding:0 20px 16px;border-bottom:1px solid var(--border)}
.modal-art-wrap{width:100%;height:210px;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;margin-bottom:16px;border-radius:12px}
.modal-art-wrap img{width:100%;height:100%;object-fit:cover}
.big-vinyl{width:150px;height:150px;border-radius:50%;background:conic-gradient(from 0deg,#111 0deg,#1c1c1c 10deg,#111 20deg,#1c1c1c 30deg,#111 40deg,#1c1c1c 50deg,#111 60deg,#1c1c1c 70deg,#111 80deg,#1c1c1c 90deg,#111 100deg,#1c1c1c 110deg,#111 120deg,#1c1c1c 130deg,#111 140deg,#1c1c1c 150deg,#111 160deg,#1c1c1c 170deg,#111 180deg,#1c1c1c 190deg,#111 200deg,#1c1c1c 210deg,#111 220deg,#1c1c1c 230deg,#111 240deg,#1c1c1c 250deg,#111 260deg,#1c1c1c 270deg,#111 280deg,#1c1c1c 290deg,#111 300deg,#1c1c1c 310deg,#111 320deg,#1c1c1c 330deg,#111 340deg,#1c1c1c 350deg);box-shadow:0 0 0 2px #333,inset 0 0 0 55px var(--surface2),inset 0 0 0 57px #333;display:flex;align-items:center;justify-content:center;animation:spin 8s linear infinite;position:relative}
.big-vinyl::after{content:'';width:22px;height:22px;border-radius:50%;background:var(--accent);position:absolute}
.art-overlay-btns{position:absolute;bottom:10px;right:10px;display:flex;gap:6px}
.art-overlay-btn{background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:calc(11px * var(--fs-scale,1));font-weight:600;padding:6px 11px;cursor:pointer;display:flex;align-items:center;gap:4px;backdrop-filter:blur(6px);transition:all .2s;white-space:nowrap}
.art-overlay-btn:active{transform:scale(.94)}
.art-overlay-btn.gold{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.modal-title{font-family:'Playfair Display',serif;font-size:calc(22px * var(--fs-scale,1));font-weight:700;margin-bottom:4px;line-height:1.2}
.modal-artist{font-size:calc(14px * var(--fs-scale,1));color:var(--text-dim);margin-bottom:12px}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap}
.modal-body{padding:20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-item{}
.detail-item.full{grid-column:1/-1}
.detail-label{font-size:calc(10px * var(--fs-scale,1));font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.detail-value{font-size:calc(14px * var(--fs-scale,1));font-weight:500}
.detail-value.mono{font-family:'DM Mono',monospace}
.detail-value.gold{color:var(--accent)}.detail-value.green{color:var(--green-t)}.detail-value.red{color:var(--red-t)}
.tracklist-title{font-family:'Playfair Display',serif;font-size:calc(16px * var(--fs-scale,1));font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tracklist-title::after{content:'';flex:1;height:1px;background:var(--border)}
.track-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.track-row:last-child{border-bottom:none}
.track-num{font-family:'DM Mono',monospace;font-size:calc(11px * var(--fs-scale,1));color:var(--text-muted);width:18px;text-align:right;flex-shrink:0}
.track-name{flex:1;font-size:calc(13px * var(--fs-scale,1))}
.track-dur{font-family:'DM Mono',monospace;font-size:calc(11px * var(--fs-scale,1));color:var(--text-muted);flex-shrink:0}
input[type=file].hidden-file{display:none}
.want-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;gap:12px;transition:transform .14s;position:relative;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent}
.want-card:active{transform:scale(.985)}
.want-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue)}
.want-art{width:68px;height:68px;border-radius:10px;object-fit:cover;flex-shrink:0;box-shadow:0 3px 12px rgba(0,0,0,.4)}
.want-art-placeholder{width:68px;height:68px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:calc(26px * var(--fs-scale,1));flex-shrink:0}
.want-art-col{flex-shrink:0;display:flex;flex-direction:column;gap:0}
.want-info{flex:1;min-width:0}
.want-title{font-weight:700;font-size:calc(14px * var(--fs-scale,1));margin-bottom:2px;line-height:1.25}
.want-artist{font-size:calc(12px * var(--fs-scale,1));color:var(--text-dim);margin-bottom:7px}
.want-details{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.want-price{font-family:'DM Mono',monospace;font-size:calc(12px * var(--fs-scale,1));color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px}
.want-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.sold-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden}
.sold-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.sold-card.profit::before{background:var(--green-t)}.sold-card.loss::before{background:var(--red-t)}
.sold-row{display:flex;justify-content:space-between;align-items:flex-start}
.sold-title{font-weight:600;font-size:calc(14px * var(--fs-scale,1));margin-bottom:2px}
.sold-artist{font-size:calc(12px * var(--fs-scale,1));color:var(--text-dim);margin-bottom:8px}
.sold-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sold-pl{font-family:'DM Mono',monospace;font-size:calc(18px * var(--fs-scale,1));font-weight:600}
.sold-pl.pos{color:var(--green-t)}.sold-pl.neg{color:var(--red-t)}
.sold-date{font-size:calc(11px * var(--fs-scale,1));color:var(--text-muted);margin-top:2px;font-family:'DM Mono',monospace}
.page-tabs{display:flex;gap:8px;margin-bottom:14px}
.page-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:calc(12px * var(--fs-scale,1));font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);transition:all .2s}
.page-tab.active{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 10px;text-align:center}
.stat-pill .val{font-family:'Playfair Display',serif;font-size:calc(20px * var(--fs-scale,1));font-weight:700;color:var(--accent)}
.stat-pill .lbl{font-size:calc(9px * var(--fs-scale,1));color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.add-fab{position:fixed;bottom:calc(var(--tab-h) + 16px + env(safe-area-inset-bottom));right:18px;z-index:150;width:52px;height:52px;border-radius:50%;background:var(--accent);color:var(--bg);display:none;align-items:center;justify-content:center;font-size:calc(26px * var(--fs-scale,1));font-weight:300;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.4);border:none;transition:all .2s}
.add-fab:active{transform:scale(.92)}
/* Add Method Picker Sheet */
.add-picker-overlay{position:fixed;inset:0;z-index:820;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;-webkit-tap-highlight-color:transparent}
.add-picker-overlay.open{display:flex}
.add-picker-sheet{width:100%;max-width:480px;background:var(--surface);border-radius:24px 24px 0 0;padding:0 0 calc(var(--tab-h) + env(safe-area-inset-bottom) + 8px);box-shadow:0 -8px 40px rgba(0,0,0,.4);animation:slideUp .22s cubic-bezier(.34,1.4,.64,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.add-picker-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.add-picker-header{padding:14px 20px 6px;display:flex;align-items:center;justify-content:space-between}
.add-picker-title{font-family:'Playfair Display',serif;font-size:calc(18px * var(--fs-scale,1));font-weight:700;color:var(--text)}
.add-picker-sub{font-size:calc(11px * var(--fs-scale,1));color:var(--text-muted);margin-top:1px}
.add-picker-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:calc(16px * var(--fs-scale,1));cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.add-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 16px 4px}
.add-picker-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:16px 8px;border-radius:18px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .16s;-webkit-tap-highlight-color:transparent;min-height:88px}
.add-picker-tile:active{transform:scale(.93);border-color:var(--accent)}
.add-picker-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:calc(22px * var(--fs-scale,1));flex-shrink:0}
.add-picker-tile-label{font-size:calc(11px * var(--fs-scale,1));font-weight:700;color:var(--text);text-align:center;letter-spacing:.2px;line-height:1.3}
.add-picker-tile-sub{font-size:9.5px;color:var(--text-muted);text-align:center;line-height:1.3;margin-top:-4px}
.add-picker-dest{display:flex;gap:8px;padding:10px 16px 4px}
.add-picker-dest-btn{flex:1;padding:10px 8px;border-radius:12px;border:2px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:calc(12px * var(--fs-scale,1));font-weight:700;cursor:pointer;text-align:center;transition:all .16s;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif}
.add-picker-dest-btn.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}
.form-modal{position:fixed;inset:0;z-index:850;background:rgba(0,0,0,.96);display:none;flex-direction:column;backdrop-filter:blur(8px)}
.form-modal.open{display:flex}
.form-header{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-top:calc(18px + env(safe-area-inset-top))}
.form-header h2{font-family:'Playfair Display',serif;font-size:calc(20px * var(--fs-scale,1))}
.form-close{font-size:calc(24px * var(--fs-scale,1));color:var(--text-dim);cursor:pointer;background:none;border:none;padding:4px}
.form-body{flex:1;overflow-y:auto;padding:18px;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 18px);display:flex;flex-direction:column;gap:13px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:calc(11px * var(--fs-scale,1));font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.form-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:calc(14px * var(--fs-scale,1));outline:none;width:100%;transition:border-color .2s;-webkit-appearance:none}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-footer{padding:14px 18px;padding-bottom:calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--border)}
.btn-primary{width:100%;padding:14px;border-radius:var(--rs);background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:calc(15px * var(--fs-scale,1));font-weight:700;border:none;cursor:pointer;transition:all .2s}
.btn-primary:active{transform:scale(.98)}
.art-zone{border:2px dashed var(--border);border-radius:var(--rs);padding:18px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.art-zone:active{border-color:var(--accent)}
.art-zone img{width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-bottom:8px}
.art-zone-label{font-size:calc(12px * var(--fs-scale,1));color:var(--text-muted)}
.art-zone-icon{font-size:calc(26px * var(--fs-scale,1));margin-bottom:8px}
/* FULL SCREEN PANELS (Music ID, Search, ACR, Color) */
.fullpanel{position:fixed;top:var(--hdr-h);left:0;right:0;bottom:0;z-index:810;display:none;flex-direction:column;background:var(--bg)}
.fullpanel.open{display:flex;flex-direction:column}.fp-header{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--surface)}
.fp-back{font-size:calc(22px * var(--fs-scale,1));cursor:pointer;background:none;border:none;color:var(--text-dim);padding:4px;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;transition:background .15s}.fp-back:active{background:var(--surface2)}
.fp-title{font-family:'Playfair Display',serif;font-size:calc(20px * var(--fs-scale,1));flex:1}
.fp-body{flex:1;overflow-y:auto;padding:18px;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 24px);display:flex;flex-direction:column;gap:14px}
.fp-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.fp-section-hdr{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:calc(11px * var(--fs-scale,1));font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
.fp-section-body{padding:14px 16px}
.srch-type-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.srch-type-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.srch-type-btn:active{transform:scale(.93)}
.sp-mode-btn{padding:10px 16px;font-size:12px;font-weight:700;border:none;background:none;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent}
.sp-mode-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.mb-result-item{padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s;margin-bottom:8px}
.mb-result-item.expanded{border-color:var(--accent);background:var(--surface);box-shadow:0 2px 16px rgba(0,0,0,.15)}
.mb-result-detail{display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.mb-result-item.expanded .mb-result-detail{display:block}
.mb-result-item:last-child{margin-bottom:0}
.mb-result-item:active{opacity:.8;transform:scale(.99)}
.mb-result-title{font-size:calc(14px * var(--fs-scale,1));font-weight:700;line-height:1.2}
.mb-result-sub{font-size:calc(11px * var(--fs-scale,1));color:var(--text-dim);margin-top:3px;line-height:1.4}
.sr-chip{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);white-space:nowrap}
.sr-chip-dim{color:var(--text-muted);font-style:italic}
.sr-chip-accent{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:var(--accent)}
.sr-chip-green{background:rgba(93,186,130,.1);border-color:rgba(93,186,130,.3);color:var(--green-t)}
.mb-result-item.expanded .sr-chevron{transform:rotate(180deg)}
.listen-btn-large{width:100%;padding:16px;border-radius:var(--r);background:var(--surface2);border:2px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:calc(15px * var(--fs-scale,1));font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.listen-btn-large.recording{border-color:var(--red-t);color:var(--red-t);animation:pulse-red 1.4s ease-in-out infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(224,92,74,.4)}50%{box-shadow:0 0 0 10px rgba(224,92,74,0)}}
.listen-status-text{font-size:calc(12px * var(--fs-scale,1));color:var(--text-muted);text-align:center;margin-top:8px;min-height:18px}
.acr-setup-link{font-size:calc(12px * var(--fs-scale,1));color:var(--accent);text-align:center;cursor:pointer;text-decoration:underline;margin-top:6px}
/* ── Listen Service Picker ─────────────────────────────────────────── */
.listen-svc-tile{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.listen-svc-tile:active{background:var(--surface2)}
.listen-svc-tile.active-svc{background:var(--accent-glow)}
.listen-svc-left{display:flex;align-items:flex-start;gap:12px;flex:1;min-width:0}
.listen-svc-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:calc(22px * var(--fs-scale,1));flex-shrink:0}
.listen-svc-name{font-size:calc(13px * var(--fs-scale,1));font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.listen-svc-desc{font-size:calc(11px * var(--fs-scale,1));color:var(--text-muted);line-height:1.5;margin-bottom:3px}
.listen-svc-url{font-size:calc(10px * var(--fs-scale,1));color:var(--accent);font-weight:600}
.listen-svc-tag{font-size:calc(9px * var(--fs-scale,1));font-weight:700;padding:2px 7px;border-radius:8px;letter-spacing:.4px;text-transform:uppercase}
.listen-svc-tag.free{background:rgba(56,189,248,.15);color:#38bdf8;border:1px solid rgba(56,189,248,.3)}
.listen-svc-tag.truly-free{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.listen-svc-check{font-size:calc(16px * var(--fs-scale,1));font-weight:700;color:var(--accent);opacity:0;flex-shrink:0;transition:opacity .15s}
.listen-svc-tile.active-svc .listen-svc-check{opacity:1}
.listen-svc-setup{display:none;background:var(--surface2);border-bottom:1px solid var(--border)}
.listen-svc-setup-inner{padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.listen-svc-howto{font-size:calc(12px * var(--fs-scale,1));color:var(--text-dim);line-height:1.7;padding:10px 12px;background:var(--surface);border-radius:var(--rs);border:1px solid var(--border)}
.listen-svc-save-btn{padding:11px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;font-weight:700;font-size:calc(13px * var(--fs-scale,1));cursor:pointer;font-family:'DM Sans',sans-serif;

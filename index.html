<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vinyl Vault Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.1/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0d0c;--surface:#1a1814;--surface2:#242018;--border:#2e2a22;--accent:#c9a84c;--accent-dim:#8b6914;--accent-glow:rgba(201,168,76,0.15);--text:#f0ead8;--text-dim:#8a8070;--text-muted:#5a5448;--red:#c0392b;--green-t:#5dba82;--red-t:#e05c4a;--blue:#2980b9;--r:16px;--rs:10px;--tab-h:84px;--hdr-h:64px;--fs-scale:1;--base-font-size:14px;--body-font:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* ── KPI THEME OVERRIDES (injected by applyKpiTheme) ── */
body{font-family:var(--body-font,'DM Sans',sans-serif);font-size:var(--base-font-size,14px);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:var(--hdr-h)}
#welcome-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
#welcome-screen.hidden{display:none}
.welcome-hero{background:linear-gradient(160deg,var(--surface2) 0%,var(--bg) 100%);padding:60px 28px 36px;text-align:center;position:relative;overflow:hidden}
.welcome-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 20%,var(--accent-glow) 0%,transparent 60%);pointer-events:none}
.welcome-vinyl{width:110px;height:110px;border-radius:50%;margin:0 auto 22px;background:conic-gradient(from 0deg,#111 0deg,#1c1c1c 10deg,#111 20deg,#1c1c1c 30deg,#111 40deg,#1c1c1c 50deg,#111 60deg,#1c1c1c 70deg,#111 80deg,#1c1c1c 90deg,#111 100deg,#1c1c1c 110deg,#111 120deg,#1c1c1c 130deg,#111 140deg,#1c1c1c 150deg,#111 160deg,#1c1c1c 170deg,#111 180deg,#1c1c1c 190deg,#111 200deg,#1c1c1c 210deg,#111 220deg,#1c1c1c 230deg,#111 240deg,#1c1c1c 250deg,#111 260deg,#1c1c1c 270deg,#111 280deg,#1c1c1c 290deg,#111 300deg,#1c1c1c 310deg,#111 320deg,#1c1c1c 330deg,#111 340deg,#1c1c1c 350deg);box-shadow:0 0 0 3px #333,inset 0 0 0 44px var(--surface2),inset 0 0 0 46px #333;display:flex;align-items:center;justify-content:center;animation:spin 10s linear infinite;position:relative}
.welcome-vinyl::after{content:'';width:18px;height:18px;border-radius:50%;background:var(--accent);position:absolute}
@keyframes spin{to{transform:rotate(360deg)}}
.welcome-title{font-family:'Playfair Display',serif;font-size:calc(32px * var(--fs-scale,1));font-weight:900;color:var(--accent);line-height:1;margin-bottom:6px}
.welcome-sub{font-size:calc(12px * var(--fs-scale,1));color:var(--text-dim);letter-spacing:2.5px;text-transform:uppercase}
.welcome-body{padding:24px 24px 0}
.step-list{display:flex;flex-direction:column;gap:0}
.step-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.step-item:last-child{border-bottom:none}
.step-num{width:30px;height:30px;border-radius:50%;background:var(--accent);color:var(--bg);font-weight:700;font-size:calc(12px * var(--fs-scale,1));display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-title{font-weight:600;font-size:calc(13px * var(--fs-scale,1));margin-bottom:3px}
.step-desc{font-size:calc(12px * var(--fs-scale,1));color:var(--text-dim);line-height:1.5}
.welcome-features{margin:20px 0 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.features-title{font-family:'Playfair Display',serif;font-size:var(--base-font-size,14px);font-weight:700;margin-bottom:10px;color:var(--accent)}
.feature-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:calc(12px * var(--fs-scale,1))}
.feature-row:last-child{border-bottom:none}
.feature-row span{color:var(--text-dim);flex:1}
.icon-bar-guide{margin:20px 0 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.icon-bar-guide .features-title{margin-bottom:12px}
.icon-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.icon-row:last-child{border-bottom:none}
.icon-pill{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:calc(17px * var(--fs-scale,1));flex-shrink:0;border:1px solid var(--border)}
.icon-row-text{}
.icon-row-name{font-size:calc(13px * var(--fs-scale,1));font-weight:600;margin-bottom:2px}
.icon-row-desc{font-size:calc(11px * var(--fs-scale,1));color:var(--text-dim);line-height:1.4}
.welcome-footer{padding:20px 24px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.btn-start{width:100%;padding:16px;border-radius:var(--rs);background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:calc(15px * var(--fs-scale,1));font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.3);transition:all .2s}
.btn-start:active{transform:scale(.98)}
.btn-skip{width:100%;padding:9px;background:none;border:none;color:var(--text-muted);font-size:calc(12px * var(--fs-scale,1));cursor:pointer;margin-top:6px}
.app-header{position:fixed;top:0;left:0;right:0;z-index:800;height:var(--hdr-h);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 6px 0 12px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.app-logo{font-family:'Playfair Display',serif;font-size:15px;font-weight:900;color:var(--accent);white-space:nowrap;flex-shrink:0;min-width:0}
.app-logo span{display:block;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--text-muted);font-weight:400;text-transform:uppercase;margin-top:1px}
.header-right{display:flex;gap:0px;align-items:center;flex-shrink:0;margin-left:auto}
/* More menu */
.mmenu-group-label{font-size:9px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;padding:6px 10px 3px}
.mmenu-divider{height:1px;background:var(--border);margin:4px 6px}
.mmenu-row{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s}
.mmenu-row:active{background:var(--surface2)}
.mmenu-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mmenu-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.mmenu-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
/* legacy alias kept for any remaining references */
.more-menu-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s}
.more-menu-row:active{background:var(--surface2)}
.more-menu-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── MULTI-SELECT SYSTEM ─────────────────────────────────── */
.ms-checkbox{
  width:22px;height:22px;border-radius:7px;border:2px solid var(--border);
  background:var(--surface2);flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.ms-checkbox.checked{background:var(--accent);border-color:var(--accent);}
.ms-checkbox.checked::after{content:'✓';font-size:calc(13px * var(--fs-scale,1));font-weight:800;color:var(--bg);}
/* card shake-to-select highlight */
.ms-mode .record-card,
.ms-mode .want-card,
.ms-mode .sold-card,
.ms-mode [data-ms-card]{
  transition:transform .15s,box-shadow .15s;
  padding-left:44px!important;
  position:relative;
}
.ms-card-check{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  z-index:5;pointer-events:none;
}
/* Floating action bar */
#ms-action-bar{
  position:fixed;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 12px);
  left:12px;right:12px;z-index:900;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:18px;padding:10px 14px;
  display:none;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.45);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  animation:msBarIn .22s cubic-bezier(.34,1.56,.64,1);
}
#ms-action-bar.visible{display:flex;}
@keyframes msBarIn{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
#ms-count-label{
  font-size:calc(12px * var(--fs-scale,1));font-weight:700;color:var(--text-dim);flex:1;white-space:nowrap;min-width:0;
}
#ms-count-label strong{color:var(--accent);}
.ms-bar-btn{
  padding:8px 14px;border-radius:12px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:calc(12px * var(--fs-scale,1));font-weight:700;
  white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.ms-bar-btn:active{transform:scale(.93);}
.ms-bar-del{background:rgba(224,92,74,.18);border:1px solid rgba(224,92,74,.4);color:var(--red-t);}
.ms-bar-add{background:rgba(93,186,130,.15);border:1px solid rgba(93,186,130,.4);color:var(--green-t);}
.ms-bar-cancel{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);}
/* Select-all button in page header */
.ms-select-all-btn{
  padding:6px 12px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-muted);
  font-family:'DM Sans',sans-serif;font-size:calc(11px * var(--fs-scale,1));font-weight:700;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;
}
.ms-select-all-btn:active{transform:scale(.93);}
/* Select-mode toggle button (in header) */
.ms-toggle-icon{
  width:40px;height:40px;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;border:none;background:none;
  -webkit-tap-highlight-color:transparent;transition:all .18s;
}
.ms-toggle-icon svg{width:22px;height:22px;transition:transform .18s;}
.ms-toggle-icon:active{transform:scale(.88);}
.ms-toggle-icon.active svg{stroke:var(--accent);}
.ms-toggle-icon-label{font-size:calc(7px * var(--fs-scale,1));font-weight:700;letter-spacing:.4px;text-transform:uppercase;}

/* Dynamic toolbar buttons */
.icon-btn{
  width:30px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;
  position:relative;flex-direction:column;gap:2px;
  -webkit-tap-highlight-color:transparent;
  background:none;border:none;flex-shrink:0;
}
.icon-btn svg{
  width:20px;height:20px;
  transition:transform .18s;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.3));
}
.icon-btn:active{transform:scale(.88)}
.icon-btn:active svg{transform:scale(.92)}
.icon-btn-label{
  font-size:6px;font-weight:700;letter-spacing:.3px;
  text-transform:uppercase;line-height:1;
  pointer-events:none;
}
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:820;
  height:calc(var(--tab-h) + env(safe-area-inset-bottom));
  padding:6px 2px 0;
  padding-bottom:calc(env(safe-area-inset-bottom) + 4px);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(var(--nav-col-count,7),1fr);
  align-items:start;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 -1px 24px rgba(0,0,0,.18);
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:4px;cursor:pointer;padding:4px 0 0;
  transition:transform .18s;
  width:100%;min-width:0;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.nav-item:active{transform:scale(.87)}
/* Picture icon tile */
.nav-icon{
  width:44px;height:44px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,.25),0 1px 3px rgba(0,0,0,.2);
}
.nav-item.active .nav-icon{
  transform:translateY(-3px) scale(1.08);
  box-shadow:0 8px 20px rgba(0,0,0,.3),0 2px 6px rgba(0,0,0,.2);
}
/* Gradient backgrounds per tab */
#nav-dash    .nav-icon{background:linear-gradient(145deg,#b8860b,#c9a84c,#f0c060)}
#nav-collection .nav-icon{background:linear-gradient(145deg,#0e6faa,#38bdf8,#7dd3fc)}
#nav-wantlist .nav-icon{background:linear-gradient(145deg,#9b1a2e,#fb7185,#fca5a5)}
#nav-sold    .nav-icon{background:linear-gradient(145deg,#166534,#4ade80,#86efac)}
#nav-selling .nav-icon{background:linear-gradient(145deg,#92400e,#f59e0b,#fcd34d)}
#nav-market  .nav-icon{background:linear-gradient(145deg,#4c1d95,#a78bfa,#c4b5fd)}
#nav-events  .nav-icon{background:linear-gradient(145deg,#064e3b,#10b981,#6ee7b7)}

/* ── SOLD KPI STRIP ──────────────────────────────────────── */
.sold-kpi-strip{display:flex;flex-wrap:nowrap;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sold-kpi-strip::-webkit-scrollbar{display:none}
.sold-kpi-chip{
  flex-shrink:0;min-width:100px;padding:12px 14px;border-radius:14px;
  background:var(--surface2);border:1px solid var(--border);
  cursor:grab;user-select:none;position:relative;touch-action:pan-x pan-y;
  transition:transform .15s,box-shadow .15s;
}
.sold-kpi-chip[style*="cursor:pointer"]{cursor:pointer!important}
.sold-kpi-chip:active{cursor:grabbing}
.sold-kpi-chip.dragging{opacity:.45;transform:scale(.93);box-shadow:none}
.sold-kpi-chip.drag-over{transform:scale(1.04);border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
.sold-kpi-v{font-family:'Playfair Display',serif;font-size:calc(22px * var(--fs-scale,1));font-weight:700;line-height:1;white-space:nowrap}
.sold-kpi-l{font-size:calc(8px * var(--fs-scale,1));font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--text-muted);margin-bottom:5px;white-space:nowrap}
/* Value-only colour — background stays neutral like Financial Overview */
.skc-profit .sold-kpi-v{color:var(--green-t)}  .skc-profit{border-color:var(--border);background:var(--surface2)}
.skc-loss   .sold-kpi-v{color:var(--red-t)}    .skc-loss  {border-color:var(--border);background:var(--surface2)}
.skc-amber  .sold-kpi-v{color:var(--accent)}    .skc-amber {border-color:var(--border);background:var(--surface2)}
.skc-blue   .sold-kpi-v{color:#38bdf8}          .skc-blue  {border-color:var(--border);background:var(--surface2)}
.skc-purple .sold-kpi-v{color:#a78bfa}          .skc-purple{border-color:var(--border);background:var(--surface2)}
.skc-dim    .sold-kpi-v{color:var(--text)}       .skc-dim   {border-color:var(--border);background:var(--surface2)}
/* Customise sheet */
.skc-picker-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.skc-picker-row:last-child{border-bottom:none}
/* ── END SOLD KPI STRIP ───────────────────────────────────── */
.evt-kpi-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.evt-kpi-strip::-webkit-scrollbar{display:none}
.evt-kpi{
  flex-shrink:0;min-width:100px;padding:12px 14px;border-radius:14px;
  background:var(--surface2);border:1px solid var(--border);
  cursor:grab;user-select:none;position:relative;
  transition:transform .15s,box-shadow .15s;
}
.evt-kpi.dragging{opacity:.5;transform:scale(.95)}
.evt-kpi-val{font-family:'Playfair Display',serif;font-size:calc(22px * var(--fs-scale,1));font-weight:700;line-height:1}
.evt-kpi-lbl{font-size:calc(8px * var(--fs-scale,1));font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--text-muted);margin-bottom:4px}
/* Value-only colour — bg stays neutral */
.evt-kpi.green  .evt-kpi-val{color:var(--green-t)}  .evt-kpi.green {border-color:var(--border)}
.evt-kpi.amber  .evt-kpi-val{color:var(--accent)}    .evt-kpi.amber {border-color:var(--border)}
.evt-kpi.blue   .evt-kpi-val{color:#38bdf8}           .evt-kpi.blue  {border-color:var(--border)}
.evt-kpi.purple .evt-kpi-val{color:#a78bfa}           .evt-kpi.purple{border-color:var(--border)}
/* Notify toggle */
.evt-notify-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:12px}
.evt-notify-toggle{position:relative;width:44px;height:24px;cursor:pointer}
.evt-notify-toggle input{opacity:0;width:0;height:0}
.evt-notify-slider{position:absolute;inset:0;background:var(--surface2);border-radius:12px;transition:.3s;border:1px solid var(--border)}
.evt-notify-slider::before{content:'';position:absolute;height:18px;width:18px;left:2px;top:2px;background:var(--text-muted);border-radius:50%;transition:.3s}
.evt-notify-toggle input:checked+.evt-notify-slider{background:rgba(16,185,129,.3);border-color:rgba(16,185,129,.5)}
.evt-notify-toggle input:checked+.evt-notify-slider::before{transform:translateX(20px);background:var(--green-t)}
/* Artist event group */
.evt-artist-group{margin-bottom:16px}
.evt-artist-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer}
.evt-artist-name{font-size:calc(14px * var(--fs-scale,1));font-weight:700;flex:1}
.evt-artist-chip{font-size:calc(9px * var(--fs-scale,1));font-weight:800;padding:2px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.5px}
.evt-section-hdr{font-size:calc(10px * var(--fs-scale,1));font-weight:800;text-transform:uppercase;letter-spacing:1.1px;color:var(--text-muted);margin:12px 0 8px;display:flex;align-items:center;gap:8px}
.evt-section-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
/* Alert banner */
.evt-alert-banner{
  background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(16,185,129,.06));
  border:1px solid rgba(16,185,129,.4);border-radius:16px;
  padding:14px 16px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start;
}
.evt-alert-dot{width:8px;height:8px;border-radius:50%;background:var(--green-t);flex-shrink:0;margin-top:4px;animation:evtPulse 1.8s ease-in-out infinite}
/* New release card */
.evt-release-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:center;
  cursor:pointer;transition:transform .14s;-webkit-tap-highlight-color:transparent;
}
.evt-release-card:active{transform:scale(.97)}
.evt-release-card.upcoming{border-color:rgba(201,168,76,.4);background:linear-gradient(135deg,rgba(201,168,76,.08),transparent)}
.evt-release-art{width:48px;height:48px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:calc(22px * var(--fs-scale,1))}
/* ── DISCOVER NEARBY ─────────────────────────────────────── */
.evt-discover-card{
  background:linear-gradient(135deg,rgba(56,189,248,.1),rgba(56,189,248,.03));
  border:1px solid rgba(56,189,248,.3);border-radius:16px;
  padding:14px 16px;margin-bottom:14px;
}
.evt-discover-title{font-size:calc(13px * var(--fs-scale,1));font-weight:800;color:#38bdf8;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.evt-discover-sub{font-size:calc(11px * var(--fs-scale,1));color:var(--text-muted);margin-bottom:12px;line-height:1.5}
.evt-discover-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.evt-zip-input{
  flex:1;min-width:100px;padding:9px 12px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:calc(14px * var(--fs-scale,1));
  outline:none;-webkit
